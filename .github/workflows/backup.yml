name: Supabase Database Backup

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          PROJECT_REF="${SUPABASE_PROJECT_ID//[[:space:]]/}"

          if [[ "$PROJECT_REF" =~ supabase\.co ]]; then
            PROJECT_REF="$(echo "$PROJECT_REF" | sed -E 's|^https?://||; s|\.supabase\.co.*||')"
          fi

          if [[ -z "$PROJECT_REF" ]]; then
            echo "::error::SUPABASE_PROJECT_ID is empty. Add the 20-letter Reference ID from Supabase Dashboard → Project Settings → General."
            exit 1
          fi

          if [[ ! "$PROJECT_REF" =~ ^[a-z]{20}$ ]]; then
            echo "::error::Invalid project ref format. Expected 20 lowercase letters (Reference ID), got length ${#PROJECT_REF}."
            exit 1
          fi

          supabase link --project-ref "$PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"

      - name: Dump database
        run: supabase db dump -f supabase-backup.sql --linked

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: supabase-backup.sql
          retention-days: 30
