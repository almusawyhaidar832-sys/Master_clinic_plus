name: Supabase Database Backup

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          PROJECT_REF="$(grep -E '^project_id\s*=' supabase/config.toml | sed -E 's/^project_id\s*=\s*"([^"]+)".*/\1/' | tr -d '[:space:]')"

          if [[ -z "$PROJECT_REF" ]]; then
            echo "::error::Could not read project_id from supabase/config.toml"
            exit 1
          fi

          if [[ ! "$PROJECT_REF" =~ ^[a-z]{20}$ ]]; then
            echo "::error::Invalid project ref in supabase/config.toml. Expected 20 lowercase letters, got length ${#PROJECT_REF}."
            exit 1
          fi

          echo "Linking project ref: $PROJECT_REF"
          supabase link --project-ref "$PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"

      - name: Dump database
        run: supabase db dump -f supabase-backup.sql --linked

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: supabase-backup.sql
          retention-days: 30
